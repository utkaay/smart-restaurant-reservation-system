<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Jack&rsquo;s Smart Reservation System</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/home.css">
    <link rel="stylesheet" href="../styles/account.css">
    <link rel="stylesheet" href="../styles/concierge.css">
    <link rel="stylesheet" href="../styles/contact.css">
    <link rel="stylesheet" href="../styles/booking.css">
    <link rel="stylesheet" href="../styles/booking-3d.css">
    <link rel="stylesheet" href="../styles/animations.css">
    <link rel="stylesheet" href="../styles/restaurants.css">
    <link rel="stylesheet" href="../styles/refinements.css">
    <link rel="stylesheet" href="../styles/responsive.css">
    <link rel="stylesheet" href="../styles/customer-header.css">
</head>
<body data-customer-page="signup">
    <header class="customer-header" data-customer-header data-header-variant="internal">
        <div class="customer-header__inner">
            <a class="customer-header__brand" href="../index.html#home" id="homeLink" aria-label="Jack's home">
                <span class="customer-header__brand-wordmark">JACK&rsquo;S</span>
                <small class="customer-header__brand-subtitle">Smart Reservation System</small>
            </a>
            <button class="customer-header__menu" type="button" aria-expanded="false" aria-controls="customerHeaderPanel" aria-label="Open navigation menu" data-customer-menu-button>
                <span class="customer-header__menu-lines" aria-hidden="true"></span>
            </button>
            <div class="customer-header__panel" id="customerHeaderPanel">
                <nav class="customer-header__nav" aria-label="Primary navigation">
                    <a class="customer-header__link" href="../index.html#home" data-header-route="discover">Discover</a>
                    <a class="customer-header__link" href="../index.html#restaurants" data-header-route="restaurants">Restaurants</a>
                    <a class="customer-header__link" href="concierge.html" id="smartConciergeLink" data-header-route="concierge">Smart Concierge</a>
                    <a class="customer-header__link" href="profile.html" data-header-route="bookings" data-customer-member hidden>My Bookings</a>
                    <a class="customer-header__link" href="contact.html" data-header-route="contact">Contact</a>
                </nav>
                <div class="customer-header__actions" aria-label="Account and reservation navigation">
                    <a class="customer-header__auth-link" href="login.html" id="authNavLink" data-header-route="account" data-profile-nav-initials aria-label="Login" aria-current="page">Login</a>
                    <button class="customer-header__logout is-hidden" type="button" id="logoutButton" data-customer-member hidden>Logout</button>
                    <a class="customer-header__cta" href="../index.html#searchForm" data-header-route="find-table">Find a Table</a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="profile-page page-view" id="signup">
            <div class="profile-page-inner">
                <div class="profile-page-heading">
                    <div>
                        <p class="eyebrow">Create account</p>
                    </div>
                    <button class="secondary-action" type="button" id="backFromLoginButton">Back to restaurants</button>
                </div>

                <div class="profile-dashboard auth-dashboard" id="authSection" aria-live="polite"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Jack&rsquo;s Smart Reservation System. SE Bootcamp Project 1</p>
    </footer>

    <!-- Factory data: constants only -->
    <script src="../data/factories/restaurant-factory.js"></script>
    <script src="../data/factories/booking-factory.js"></script>
    <script src="../data/factories/user-factory.js"></script>
    <script src="../data/factories/local-storage-factory.js"></script>

    <!-- Shared helper and the single seeder call site -->
    <script src="../scripts/pages/helper.js"></script>
    <script src="../data/seeders/seeders.js"></script>

    <!-- Customer features -->
    <script src="../scripts/pages/config.js"></script>
    <script src="../scripts/pages/core.js"></script>
    <script src="../scripts/pages/discovery.js"></script>
    <script src="../scripts/pages/account.js"></script>
    <script src="../scripts/pages/booking-schedule.js"></script>
    <script src="../scripts/pages/booking-guests.js"></script>
    <script src="../scripts/pages/booking-selection.js"></script>
    <script src="../scripts/pages/auth.js"></script>
    <script src="../scripts/pages/app.js"></script>
    <script src="../scripts/pages/customer-header.js"></script>
</body>
</html>
