<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Jack's Restaurant Management Portal</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="../../styles/base.css">
    <link rel="stylesheet" href="../../styles/home.css">
    <link rel="stylesheet" href="../../styles/account.css">
    <link rel="stylesheet" href="../../styles/concierge.css">
    <link rel="stylesheet" href="../../styles/contact.css">
    <link rel="stylesheet" href="../../styles/booking.css">
    <link rel="stylesheet" href="../../styles/booking-3d.css">
    <link rel="stylesheet" href="../../styles/animations.css">
    <link rel="stylesheet" href="../../styles/restaurants.css">
    <link rel="stylesheet" href="../../styles/refinements.css">
    <link rel="stylesheet" href="../../styles/responsive.css">
    <link rel="stylesheet" href="../../styles/admin-layout.css">
    <link rel="stylesheet" href="../../styles/admin-components.css">
    <link rel="stylesheet" href="../../styles/admin-responsive.css">
</head>
<body class="admin-body" data-admin-page="dashboard">
    <div class="admin-shell">
        <aside class="admin-sidebar" id="adminSidebar" aria-label="Admin sections">
            <a class="admin-brand" href="./index.html">Jack's Restaurant Management Portal</a>

            <nav class="admin-section-nav" aria-label="Admin section navigation">
                <button class="admin-nav-item is-active" type="button" data-admin-section="dashboard">Dashboard</button>
                <button class="admin-nav-item" type="button" data-admin-section="restaurants">Restaurant Manager</button>
                <button class="admin-nav-item" type="button" data-admin-section="reservations">Reservations</button>
                <button class="admin-nav-item" type="button" data-admin-section="tables">Tables</button>
                <button class="admin-nav-item" type="button" data-admin-section="settings">Settings</button>
            </nav>

            <div class="admin-sidebar-actions">
                <button class="secondary-action" type="button" id="viewCustomerSiteButton">View Customer Site</button>
                <button class="primary-action" type="button" id="adminLogoutButton">Logout</button>
            </div>
        </aside>

        <div class="admin-content-shell">
            <header class="admin-mobile-header">
                <button class="secondary-action admin-menu-button" type="button" id="adminMenuButton" aria-controls="adminSidebar" aria-expanded="false">Menu</button>
                <span class="admin-mobile-brand">Jack's Portal</span>
            </header>

            <main class="admin-main">
                <div class="admin-page-heading">
                    <div>
                        <h1 id="adminPageTitle">Dashboard</h1>
                        <p id="adminPageSubtitle">Manage restaurants, reservations, pricing, and table availability.</p>
                    </div>
                </div>

                <div class="admin-view" id="adminDashboard" aria-live="polite"></div>
            </main>
        </div>
</div>
    <script src="../../data/factories/restaurant-factory.js"></script>
    <script src="../../data/factories/booking-factory.js"></script>
    <script src="../../data/factories/user-factory.js"></script>
    <script src="../../data/factories/local-storage-factory.js"></script>
    <script src="../../scripts/pages/helper.js"></script>
    <script src="../../data/seeders/seeders.js"></script>
    <script src="../../scripts/pages/admin/config.js"></script>
    <script src="../../scripts/pages/admin/core.js"></script>
    <script src="../../scripts/pages/admin/restaurant-management.js"></script>
    <script src="../../scripts/pages/admin/dashboard-views.js"></script>
    <script src="../../scripts/pages/admin/actions.js"></script>
    <script src="../../scripts/pages/admin/auth.js"></script>
</body>
</html>
