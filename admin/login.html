<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Jack's Restaurant Management Portal</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="./CSS/admin.css">
    <script src="./JavaScript/admin.js" defer></script>
</head>
<body class="admin-body admin-login-body" data-admin-page="login">
    <main class="admin-login-shell">
        <section class="admin-login-card" aria-labelledby="adminLoginTitle">
            <div class="admin-login-heading">
                <p class="eyebrow">Admin access</p>
                <h1 id="adminLoginTitle">Jack's Restaurant Management Portal</h1>
            </div>

            <form class="admin-login-form" id="adminLoginForm" novalidate>
                <p class="admin-message" id="adminLoginMessage" hidden aria-live="polite"></p>

                <label>
                    Email
                    <input type="email" name="email" autocomplete="email" required>
                </label>

                <label>
                    Password
                    <span class="password-field">
                        <input type="password" name="password" autocomplete="current-password" required>
                        <button class="password-toggle" type="button" aria-label="Show password" data-admin-password-toggle>
                            <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </span>
                </label>

                <button class="primary-action" type="submit">Login</button>
            </form>

            <a class="admin-secondary-link" href="../index.html">View Customer Site</a>
        </section>
    </main>
</body>
</html>
